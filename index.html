<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brochure Digital</title>
    <!-- Incluimos Firebase desde el CDN oficial -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- TUS CREDENCIALES (Cópialas de Firebase aquí) ---
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Función para asegurar la conexión antes de guardar
        async function conectarYGuardar(datos) {
            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    await signInAnonymously(auth);
                }
                // Aquí ejecutas tu lógica de guardado a Firestore
                console.log("Conectado con éxito");
            });
        }

        // Llama a esto cuando el usuario presione "Guardar"
        window.guardarCambios = async (datos) => {
            await conectarYGuardar();
            // Ejemplo de guardado:
            // await setDoc(doc(db, "brochures", "tu_documento"), datos);
        };
    </script>
</head>
<body>
    <h1>Tu Brochure Digital</h1>
    <p>La conexión a la nube está integrada.</p>
    <button onclick="guardarCambios()">Guardar en la Nube</button>
</body>
</html>
